spring.application.name=shipment-tracking

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/shipment_tracking
spring.datasource.username=tracking_user
spring.datasource.password=tracking_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
app.jwt.secret=${JWT_SECRET:change-me-in-production-must-be-at-least-256-bits-long}
app.jwt.expiration-ms=3600000
app.jwt.refresh-expiration-ms=86400000

# Rate limiting
app.rate-limit.requests-per-minute=1000

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# Async thread pool for webhook dispatch
spring.task.execution.pool.core-size=10
spring.task.execution.pool.max-size=50
spring.task.execution.pool.queue-capacity=1000

# Logging
logging.level.com.logistics.tracking=INFO
logging.level.org.springframework.security=WARN
