version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: shipment_tracking_db
    environment:
      POSTGRES_DB: shipment_tracking
      POSTGRES_USER: tracking_user
      POSTGRES_PASSWORD: tracking_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracking_user -d shipment_tracking"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shipment_tracking_api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/shipment_tracking
      SPRING_DATASOURCE_USERNAME: tracking_user
      SPRING_DATASOURCE_PASSWORD: tracking_pass
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-must-be-at-least-256-bits}
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

volumes:
  postgres_data:
